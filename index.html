<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blackjack</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <details id="rules">
    <summary>How to Play</summary>
    <ul>
        <li>Get as close to 21 without going over</li>
        <li>Dealer must hit on 16 and stand on 17</li>
        <li>Blackjack (Ace + 10) beats everything</li>
    </ul>
</details>
    
    <div id="layout">
    <h1>Blackjack</h1>
    <div id="game">
    <div id="dealerArea">
        <h2>Dealer</h2>
        <div id="dealerCards"></div>
        <p id="dealerScore">Score: ?</p>
    </div>

    <div id="playerArea">
        <h2>Player</h2>
        <div id="playerCards"></div>
        <p id="playerScore">Score: 0</p>
    </div>

</div>
<p id="gameStatus">Game started. Player's turn.</p>
<div id="controls">
    <button id="hit">Hit</button>
    <button id="stand">Stand</button>
    <button id="restart">Restart</button>
</div>
</div>
    
    
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
