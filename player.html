<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blackjack</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <div id="layout">
      <div id="nav">
          <button id="home">Home</button>
      </div>
      <h1>Blackjack</h1>

      <div id="game">
        <p id="gameStatus"></p>
        
        <div id="dealerArea">
          <h2>Dealer</h2>
          <div id="dealerCards"></div>
          <p id="dealerScore">Score: ?</p>
        </div>

        <div id="playerArea">
          <h2>Player</h2>
          <div id="playerCards"></div>
          <p id="playerScore">Score: 0</p>
        </div>
      </div>

      <div id="betsystem">
        <p>Bankroll: $<span id="balance">1000</span></p>
        
        <label for="bet-input">Place your bet:</label>
        <input type="number" id="bet-input" min="100" max="1000" step="100" value="100">
        
        <button id="deal-btn">Deal Cards</button>
      </div>

      <div id="controls">
        <button id="hit">Hit</button>
        <button id="stand">Stand</button>
        <button id="double">Double</button>
        <button id="split">Split</button>
        <button id="surrender">Surrender</button>
        <button id="restart">Restart</button>
      </div>
    </div>

    <script type="module" src="./scripts/player/main.js"></script>
  </body>
</html>
